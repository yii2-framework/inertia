<svg fill="none" viewBox="0 0 1200 380" width="100%" height="340" xmlns="http://www.w3.org/2000/svg">
    <foreignObject width="100%" height="100%">
        <div xmlns="http://www.w3.org/1999/xhtml">
            <style>
                .container {
                    display: grid;
                    grid-template-columns: 1fr 1fr;
                    gap: 20px;
                    padding: 20px;
                }
                .alert-box {
                    border-left: 4px solid #1f883d;
                    padding: 12px;
                    margin-bottom: 16px;
                    border-radius: 6px;
                    background: rgba(31, 136, 61, 0.1);
                    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                    width: 100%;
                    box-sizing: border-box;
                }
                .alert-title {
                    margin: 0 0 8px 0;
                    font-weight: 600;
                }
                .alert-content {
                    margin: 0;
                    line-height: 1.5;
                }

                /* Light mode */
                @media (prefers-color-scheme: light) {
                    .alert-title { color: #000000; }
                    .alert-content { color: #333333; }
                    .alert-box { background: rgba(31, 136, 61, 0.1); }
                }

                /* Dark mode */
                @media (prefers-color-scheme: dark) {
                    .alert-title { color: #ffffff; }
                    .alert-content { color: #ffffff; }
                    .alert-box { background: rgba(31, 136, 61, 0.2); }
                }
            </style>
            <div class="container">
                <div class="alert-box">
                    <p class="alert-title"><strong>Flash &amp; Errors</strong></p>
                    <p class="alert-content">Session flash mapping to props.errors • Remaining flashes in top-level flash key • Automatic consumption</p>
                </div>
                <div class="alert-box">
                    <p class="alert-title"><strong>Page Rendering</strong></p>
                    <p class="alert-content">HTML shell for initial visits • JSON payload for Inertia XHR • Automatic format detection via X-Inertia header</p>
                </div>
                <div class="alert-box">
                    <p class="alert-title"><strong>Partial Reloads</strong></p>
                    <p class="alert-content">X-Inertia-Partial-Data filtering • X-Inertia-Partial-Except exclusion • Unrequested closures skipped</p>
                </div>
                <div class="alert-box">
                    <p class="alert-title"><strong>Shared Props</strong></p>
                    <p class="alert-content">Global data via share() • Dot-notation nesting • Lazy Closure resolution • Request-aware callbacks</p>
                </div>
                <div class="alert-box">
                    <p class="alert-title"><strong>Version Handling</strong></p>
                    <p class="alert-content">Asset version mismatch detection • 409 + X-Inertia-Location response • Session flash preservation on conflict</p>
                </div>
                <div class="alert-box">
                    <p class="alert-title"><strong>Zero jQuery</strong></p>
                    <p class="alert-content">No jQuery dependency • Redirect normalization for PUT/PATCH/DELETE • Coexists with legacy Yii2 pages</p>
                </div>
            </div>
        </div>
    </foreignObject>
</svg>
