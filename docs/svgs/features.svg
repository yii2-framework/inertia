<svg viewBox="0 0 1200 380" width="100%" height="340" xmlns="http://www.w3.org/2000/svg">
    <style>
        text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .box-bg { fill: #e6f4ea; stroke: #a7cdb3; stroke-width: 1; }
        .title { font-weight: 700; font-size: 16px; fill: #1a202c; }
        .content { font-size: 13px; fill: #4a5568; }
    </style>

    <g>
        <rect class="box-bg" x="20" y="20" width="570" height="100" rx="6"/>
        <rect x="20" y="20" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="40" y="50">Flash &amp; Errors</text>
        <text class="content" x="40" y="78">Session flash mapping to props.errors &#8226; Remaining flashes in top-level flash key</text>
        <text class="content" x="40" y="98">Automatic consumption</text>
    </g>

    <g>
        <rect class="box-bg" x="610" y="20" width="570" height="100" rx="6"/>
        <rect x="610" y="20" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="630" y="50">Page Rendering</text>
        <text class="content" x="630" y="78">HTML shell for initial visits &#8226; JSON payload for Inertia XHR</text>
        <text class="content" x="630" y="98">Automatic format detection via X-Inertia header</text>
    </g>

    <g>
        <rect class="box-bg" x="20" y="140" width="570" height="100" rx="6"/>
        <rect x="20" y="140" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="40" y="170">Partial Reloads</text>
        <text class="content" x="40" y="198">X-Inertia-Partial-Data filtering &#8226; X-Inertia-Partial-Except exclusion</text>
        <text class="content" x="40" y="218">Unrequested closures skipped</text>
    </g>

    <g>
        <rect class="box-bg" x="610" y="140" width="570" height="100" rx="6"/>
        <rect x="610" y="140" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="630" y="170">Shared Props</text>
        <text class="content" x="630" y="198">Global data via share() &#8226; Dot-notation nesting &#8226; Lazy Closure resolution</text>
        <text class="content" x="630" y="218">Request-aware callbacks</text>
    </g>

    <g>
        <rect class="box-bg" x="20" y="260" width="570" height="100" rx="6"/>
        <rect x="20" y="260" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="40" y="290">Version Handling</text>
        <text class="content" x="40" y="318">Asset version mismatch detection &#8226; 409 + X-Inertia-Location response</text>
        <text class="content" x="40" y="338">Session flash preservation on conflict</text>
    </g>

    <g>
        <rect class="box-bg" x="610" y="260" width="570" height="100" rx="6"/>
        <rect x="610" y="260" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="630" y="290">Zero jQuery</text>
        <text class="content" x="630" y="318">No jQuery dependency &#8226; Redirect normalization for PUT/PATCH/DELETE</text>
        <text class="content" x="630" y="338">Coexists with legacy Yii2 pages</text>
    </g>
</svg>
